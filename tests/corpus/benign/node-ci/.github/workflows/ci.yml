# 출처: 전형적인 Node.js 프로젝트 CI를 본뜬 양성 픽스처.
# 까다로운 양성 패턴 포함: `| shasum`(체크섬 검증)은 `| sh` 파이프 설치로 오인되면 안 된다.
name: CI
on: push
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@aaf06b9e5a39d244cc1d0f897c9e2602fc442ee3 # v4
        with:
          node-version: 22
      - run: npm ci
      - name: verify vendored archive checksum
        run: curl -sSL https://example.com/tool.tar.gz | shasum -a 256 -c checksums.txt
      - run: npm test

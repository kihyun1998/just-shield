# 출처: 전형적인 컨테이너 배포 워크플로를 본뜬 양성 픽스처 — 시크릿이 필요한
# 정상 배포 잡. 잡 수준 최소 권한 선언, 이미지는 다이제스트 핀.
# 시크릿 옆 서드파티 액션(R6)은 🟡까지 허용 — 🔴 오탐만 금지.
name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      registry:
        image: registry@sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/login-action@5d8785b43a795ee002a17dbf1a2235dc1997224b # v3
        with:
          password: ${{ secrets.REGISTRY_TOKEN }}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6

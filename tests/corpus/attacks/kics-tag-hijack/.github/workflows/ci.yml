# 재현: TeamPCP 2026-03-23 — checkmarx/kics-github-action의 버전 태그 35개 전부를
# 악성 커밋으로 강제 이동 (setup.sh 오염, 시크릿 수확·유출).
# 가변 태그 참조가 노출면이며 R1이 이를 차단해야 한다.
name: scan
on: push
permissions:
  contents: read
jobs:
  kics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: checkmarx/kics-github-action@v1.7.0
